repo_name: mth-amorim/notas-musicais
edit_uri: tree/main/docs

theme:
  name: material
  language: pt-BR
  logo: assets/icone_site-1.ico
  favicon: assets/icone_site-1.ico

markdown_extensions:
 - attr_list

extra_css:
  - stylesheets/extra.css

plugins:
- mkdocstrings:
    handlers:
      python:
        paths: [notas_musicais]